name: WP-0002 Base Policy Canary

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  policy:
    name: wp0002-policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact protected PR base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Evaluate candidate only as Git objects
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          OBJECT_STORE="$RUNNER_TEMP/wp0002-policy.git"
          REPORT_ROOT="$RUNNER_TEMP/wp0002-policy-report"
          /usr/bin/git init --bare "$OBJECT_STORE"
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
          /usr/bin/git -C "$OBJECT_STORE" -c http.extraHeader="AUTHORIZATION: basic $AUTH_HEADER" fetch \
            --no-tags --no-write-fetch-head \
            "https://github.com/AC-21/sasha-the-land-pirate.git" \
            "$BASE_SHA" "$HEAD_SHA"
          env PYTHONDONTWRITEBYTECODE=1 python3 -B Tools/Validation/validate_wp0002_policy.py \
            --repo "$OBJECT_STORE" \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF" \
            --base-repository "$BASE_REPOSITORY" \
            --head-repository "$HEAD_REPOSITORY" \
            --policy-source-sha "$BASE_SHA" \
            --report-root "$REPORT_ROOT" \
            --report BuildArtifacts/WP-0002/wp0002-policy-report.json
      - name: Retain content-addressed policy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wp0002-policy-report-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/wp0002-policy-report/BuildArtifacts/WP-0002/wp0002-policy-report.json
          if-no-files-found: error
