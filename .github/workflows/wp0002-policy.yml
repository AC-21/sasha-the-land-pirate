name: WP-0002 Base Policy Canary

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  checks: read
  contents: read
  issues: read
  pull-requests: read

jobs:
  policy:
    name: wp0002-policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact protected PR base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Evaluate candidate only as Git objects
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          OBJECT_STORE="$RUNNER_TEMP/wp0002-policy.git"
          REPORT_ROOT="$RUNNER_TEMP/wp0002-policy-report"
          mkdir -p "$REPORT_ROOT"
          /usr/bin/git init --bare "$OBJECT_STORE"
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
          /usr/bin/git -C "$OBJECT_STORE" -c http.extraHeader="AUTHORIZATION: basic $AUTH_HEADER" fetch \
            --no-tags --no-write-fetch-head \
            "https://github.com/AC-21/sasha-the-land-pirate.git" \
            "$BASE_SHA" "$HEAD_SHA"
          env PYTHONDONTWRITEBYTECODE=1 python3 -B Tools/Validation/validate_wp0002_policy.py \
            --repo "$OBJECT_STORE" \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF" \
            --base-repository "$BASE_REPOSITORY" \
            --head-repository "$HEAD_REPOSITORY" \
            --policy-source-sha "$BASE_SHA" \
            --report-root "$REPORT_ROOT" \
            --report BuildArtifacts/WP-0002/wp0002-policy-report.json
      - name: Live-authenticate an exact local-operator evidence closure
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WP0002_PROTECTION_TOKEN: ${{ secrets.WP0002_PROTECTION_READ_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OBJECT_STORE="$RUNNER_TEMP/wp0002-policy.git"
          REPORT_ROOT="$RUNNER_TEMP/wp0002-policy-report"
          forbidden_predecessor_paths=(
            "docs/evidence/WP-0002/local-operator-amendment/authority.json"
            "docs/evidence/WP-0002/local-operator-amendment/pre-merge.json"
            "docs/evidence/WP-0002/local-operator-amendment/complete.json"
            "docs/evidence/WP-0002/local-operator-successor/authority.json"
            "docs/evidence/WP-0002/local-operator-successor/pre-merge.json"
            "docs/evidence/WP-0002/local-operator-successor/complete.json"
          )
          if ! /usr/bin/git -C "$OBJECT_STORE" diff --quiet "$BASE_SHA" "$HEAD_SHA" -- "${forbidden_predecessor_paths[@]}"; then
            echo "Candidate modifies forbidden predecessor local-operator reports." >&2
            exit 1
          fi
          closure_paths=(
            "docs/evidence/WP-0002/local-operator-recovery/authority.json"
            "docs/evidence/WP-0002/local-operator-recovery/pre-merge.json"
            "docs/evidence/WP-0002/local-operator-recovery/complete.json"
          )
          if /usr/bin/git -C "$OBJECT_STORE" diff --quiet "$BASE_SHA" "$HEAD_SHA" -- "${closure_paths[@]}"; then
            echo "Candidate does not modify local-operator closure reports."
            exit 0
          fi
          stage1_sha="$(/usr/bin/git -C "$OBJECT_STORE" show "$HEAD_SHA:${closure_paths[0]}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["stage1"]["commit_sha"])')"
          control_final_head="$(/usr/bin/git -C "$OBJECT_STORE" show "$HEAD_SHA:${closure_paths[1]}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["final_pull_request"]["head_sha"])')"
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w 0)"
          for required_object in "$stage1_sha" "$control_final_head"; do
            [[ "$required_object" =~ ^[0-9a-f]{40}$ ]]
            /usr/bin/git -C "$OBJECT_STORE" -c http.extraHeader="AUTHORIZATION: basic $AUTH_HEADER" fetch \
              --no-tags --no-write-fetch-head \
              "https://github.com/AC-21/sasha-the-land-pirate.git" \
              "$required_object"
          done
          verifier="Tools/Validation/verify_wp0002_local_operator_transaction_v3.py"
          expected_verifier_sha256="2d8cd873f0a8ee357848d18e2cb57f440f6fd28fb5817e7454f816d07dc8e52d"
          actual_verifier_sha256="$(shasum -a 256 "$verifier" | cut -d ' ' -f 1)"
          [[ "$actual_verifier_sha256" == "$expected_verifier_sha256" ]]
          env PYTHONDONTWRITEBYTECODE=1 python3 -B "$verifier" \
            verify-evidence-closure \
            --repository-path "$OBJECT_STORE" \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --output "$REPORT_ROOT/wp0002-local-operator-recovery-closure-verification.json"
      - name: Retain content-addressed policy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wp0002-policy-report-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/wp0002-policy-report/
          if-no-files-found: error
